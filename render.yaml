################################################################################
# Kincare — Render Blueprint (FREE TIER, no credit card)
#
# Provisions a single web service that hosts the NestJS API AND runs the
# BullMQ workers inline (RUN_WORKERS_INLINE=true) so we fit inside Render's
# one-free-service-per-account constraint.
#
# DATABASE_URL  — point at a free Neon Postgres (https://neon.tech).
# REDIS_URL     — point at a free Upstash Redis (https://upstash.com), use
#                 the `rediss://` (TLS) connection string.
#
# Both URLs are marked `sync: false`, meaning Render will prompt for them
# when you create the Blueprint and never log them. Paste them in once.
#
# The Next.js web app is NOT deployed here — deploy it on Vercel Hobby
# (also free, no card) and set NEXT_PUBLIC_API_URL to this service's URL.
#
# WARNING: Render free web services spin down after 15 min of inactivity.
# First request after idle takes ~30 s. Acceptable for a demo, not for prod.
################################################################################

services:
  - type: web
    name: kincare-api
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: |
      npm install -g pnpm@9.7.0
      NODE_ENV=development pnpm install --frozen-lockfile
      pnpm --filter @kincare/api... build
    startCommand: |
      pnpm --filter @kincare/db prisma:deploy
      pnpm --filter @kincare/api start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: REDIS_QUEUE_PREFIX
        value: kincare
      - key: OTEL_DISABLED
        value: "true"
      - key: METRICS_ENABLED
        value: "false"
      - key: HL7_MLLP_ENABLED
        value: "false"
      - key: DEFAULT_TENANT_ID
        value: default

      # Inline workers (no separate dyno on free tier).
      - key: RUN_WORKERS_INLINE
        value: "true"
      - key: WORKERS_ENABLE_PDF
        value: "false"   # puppeteer won't fit in 512 MB
      - key: WORKERS_SKIP_HL7
        value: "false"

      # Cross-domain cookies for Vercel ↔ Render.
      - key: COOKIE_SAMESITE
        value: none

      # External services — paste these in the Render dashboard on first deploy.
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false

      # Auto-generated secrets (Render fills these in once and never re-rolls).
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CSRF_SECRET
        generateValue: true
      - key: PASSWORD_PEPPER
        generateValue: true
      - key: PHI_ENCRYPTION_KEY
        generateValue: true

      # Set after deploying the Vercel web app (e.g. https://kincare.vercel.app).
      - key: CORS_ORIGIN
        sync: false
      - key: PUBLIC_WEB_URL
        sync: false
