################################################################################
# Kincare — Render Blueprint
#
# Provisions four resources from this monorepo:
#   • kincare-api      — NestJS HTTP API (apps/api)
#   • kincare-web      — Next.js patient + staff portal (apps/web)
#   • kincare-worker   — BullMQ background worker (apps/worker)
#   • kincare-db       — Managed Postgres (Prisma migrations run pre-deploy)
#
# REDIS is NOT defined here because Render's Key Value (Redis) add-on isn't
# always blueprint-provisionable. Create it manually in the dashboard (or use
# Upstash) and set REDIS_URL on the api + worker services.
#
# Memory: Nest + Prisma + OpenTelemetry won't reliably fit in 512 MB. The
# `starter` plan is also 512 MB; bump the API to `standard` if you hit OOM.
################################################################################

databases:
  - name: kincare-db
    plan: free
    databaseName: kincare
    ipAllowList: []

# envVarGroups only accept plain key/value pairs — no fromDatabase /
# generateValue / sync:false. Secrets and dynamic references live on the
# individual services and are duplicated across api + worker as needed.
envVarGroups:
  - name: kincare-shared
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: REDIS_QUEUE_PREFIX
        value: kincare
      - key: OTEL_DISABLED
        value: "true"
      - key: METRICS_ENABLED
        value: "true"
      - key: HL7_MLLP_ENABLED
        value: "false"
      - key: DEFAULT_TENANT_ID
        value: default

services:
  # ─────────────────────────── API ────────────────────────────
  - type: web
    name: kincare-api
    runtime: node
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: |
      corepack enable
      corepack prepare pnpm@9.7.0 --activate
      pnpm install --frozen-lockfile
      pnpm --filter @kincare/api... build
    startCommand: pnpm --filter @kincare/api start
    preDeployCommand: pnpm --filter @kincare/db prisma:deploy
    healthCheckPath: /health
    envVars:
      - fromGroup: kincare-shared
      # Database (provisioned by this blueprint).
      - key: DATABASE_URL
        fromDatabase:
          name: kincare-db
          property: connectionString
      # Redis — fill in manually after creating the add-on / Upstash instance.
      - key: REDIS_URL
        sync: false
      # Secrets (auto-generated by Render, never shown after creation).
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CSRF_SECRET
        generateValue: true
      - key: PASSWORD_PEPPER
        generateValue: true
      - key: PHI_ENCRYPTION_KEY
        generateValue: true
      # Public URLs — replace with the real *.onrender.com hosts after deploy.
      - key: PUBLIC_API_URL
        value: https://kincare-api.onrender.com
      - key: PUBLIC_WEB_URL
        value: https://kincare-web.onrender.com
      - key: COOKIE_DOMAIN
        value: onrender.com

  # ─────────────────────────── WEB ────────────────────────────
  - type: web
    name: kincare-web
    runtime: node
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: |
      corepack enable
      corepack prepare pnpm@9.7.0 --activate
      pnpm install --frozen-lockfile
      pnpm --filter @kincare/web... build
    startCommand: pnpm --filter @kincare/web start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://kincare-api.onrender.com

  # ────────────────────────── WORKER ──────────────────────────
  - type: worker
    name: kincare-worker
    runtime: node
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: |
      corepack enable
      corepack prepare pnpm@9.7.0 --activate
      pnpm install --frozen-lockfile
      pnpm --filter @kincare/worker... build
    startCommand: pnpm --filter @kincare/worker start
    envVars:
      - fromGroup: kincare-shared
      - key: DATABASE_URL
        fromDatabase:
          name: kincare-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      # Worker re-uses the API's encryption key so it can decrypt PHI columns.
      # Copy/paste from the kincare-api env tab after first deploy.
      - key: PHI_ENCRYPTION_KEY
        sync: false
