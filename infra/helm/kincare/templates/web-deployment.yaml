{{- if .Values.web.enabled }}
{{- $component := "web" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kincare.fullname" . }}-{{ $component }}
  labels: {{- include "kincare.componentLabels" (dict "Chart" .Chart "Release" .Release "Values" .Values "component" $component) | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kincare.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: {{ $component }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "kincare.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: {{ $component }}
    spec:
      serviceAccountName: {{ include "kincare.fullname" . }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: web
          image: {{ include "kincare.image" (dict "image" .Values.web.image "Values" .Values "Chart" .Chart) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - { name: http, containerPort: {{ .Values.web.port }} }
          env:
            - name: NEXT_PUBLIC_API_URL
              value: {{ .Values.config.PUBLIC_API_URL | quote }}
            - name: PORT
              value: {{ .Values.web.port | quote }}
          livenessProbe:  { httpGet: { path: /, port: http }, initialDelaySeconds: 30 }
          readinessProbe: { httpGet: { path: /, port: http }, initialDelaySeconds: 5  }
          resources: {{- toYaml .Values.web.resources | nindent 12 }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kincare.fullname" . }}-web
  labels: {{- include "kincare.componentLabels" (dict "Chart" .Chart "Release" .Release "Values" .Values "component" "web") | nindent 4 }}
spec:
  type: {{ .Values.web.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "kincare.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: web
  ports:
    - { name: http, port: {{ .Values.web.service.port }}, targetPort: http }
{{- end }}
