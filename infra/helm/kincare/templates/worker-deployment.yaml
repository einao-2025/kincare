{{- if .Values.worker.enabled }}
{{- $component := "worker" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kincare.fullname" . }}-{{ $component }}
  labels: {{- include "kincare.componentLabels" (dict "Chart" .Chart "Release" .Release "Values" .Values "component" $component) | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kincare.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: {{ $component }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "kincare.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: {{ $component }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "kincare.fullname" . }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: {{ include "kincare.image" (dict "image" .Values.worker.image "Values" .Values "Chart" .Chart) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          envFrom:
            - configMapRef: { name: {{ include "kincare.configMapName" . }} }
            - secretRef:    { name: {{ include "kincare.secretName" . }} }
          env:
            - name: OTEL_SERVICE_NAME
              value: kincare-worker
          resources: {{- toYaml .Values.worker.resources | nindent 12 }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
{{- end }}
