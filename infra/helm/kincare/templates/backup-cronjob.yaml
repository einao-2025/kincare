{{- if .Values.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "kincare.fullname" . }}-pg-backup
  labels: {{- include "kincare.componentLabels" (dict "Chart" .Chart "Release" .Release "Values" .Values "component" "backup") | nindent 4 }}
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: {{ include "kincare.fullname" . }}
          restartPolicy: OnFailure
          securityContext: {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
            - name: pg-backup
              image: {{ .Values.backup.image }}
              command: ["/bin/bash", "/scripts/pg-backup.sh"]
              env:
                - name: BACKUP_S3_BUCKET
                  value: {{ .Values.backup.bucket | quote }}
                - name: BACKUP_S3_PREFIX
                  value: {{ .Values.backup.prefix | quote }}
                - name: BACKUP_RETENTION_DAYS
                  value: {{ .Values.backup.retentionDays | quote }}
                - name: AWS_REGION
                  value: {{ .Values.backup.region | quote }}
              envFrom:
                - secretRef: { name: {{ include "kincare.secretName" . }} }
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
              securityContext: {{- toYaml .Values.containerSecurityContext | nindent 16 }}
          volumes:
            - name: scripts
              configMap:
                name: {{ include "kincare.fullname" . }}-backup-scripts
                defaultMode: 0755
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kincare.fullname" . }}-backup-scripts
data:
  pg-backup.sh: |-
{{ .Files.Get "scripts/pg-backup.sh" | indent 4 }}
{{- end }}
