apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kincare.fullname" . }}
  labels: {{- include "kincare.labels" . | nindent 4 }}
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kincare.fullname" . }}
  labels: {{- include "kincare.labels" . | nindent 4 }}
  annotations:
{{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
{{- range .Values.ingress.hosts }}
        - {{ .host }}
{{- end }}
      secretName: {{ include "kincare.fullname" . }}-tls
  {{- end }}
  rules:
{{- range .Values.ingress.hosts }}
    - host: {{ .host }}
      http:
        paths:
          - path: {{ .path }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "kincare.fullname" $ }}-{{ .service }}
                port:
                  number: 80
{{- end }}
{{- end }}
{{- if .Values.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kincare.fullname" . }}-default
  labels: {{- include "kincare.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector: {}
          podSelector: {}
  egress:
    - {}
{{- end }}
{{- if and .Values.observability.podMonitor.enabled .Values.api.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "kincare.fullname" . }}-api
  labels: {{- include "kincare.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  podMetricsEndpoints:
    - port: http
      path: {{ .Values.observability.podMonitor.path }}
      interval: {{ .Values.observability.podMonitor.interval }}
{{- end }}
