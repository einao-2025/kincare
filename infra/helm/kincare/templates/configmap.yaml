apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kincare.configMapName" . }}
  labels: {{- include "kincare.labels" . | nindent 4 }}
data:
{{- range $key, $val := .Values.config }}
  {{ $key }}: {{ $val | quote }}
{{- end }}
{{- if not .Values.secrets.existingSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kincare.secretName" . }}
  labels: {{- include "kincare.labels" . | nindent 4 }}
type: Opaque
stringData:
{{- range $key, $val := .Values.secrets.values }}
  {{ $key }}: {{ $val | quote }}
{{- end }}
{{- end }}
